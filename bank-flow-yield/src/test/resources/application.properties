spring.datasource.url=jdbc:h2:mem:bank_flow_yield;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS yield\\;SET SCHEMA yield
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=yield
spring.flyway.default-schema=yield
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false

bank-flow.kafka.topics.yield-accruals=yield-accruals
bank-flow.kafka.topics.ledger-posting-created=ledger-posting-created
bank-flow.yield.cdi.base-url=https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados
bank-flow.yield.cdi.percentage=100
bank-flow.yield.cdi.lookback-days=7
bank-flow.yield.cdi.source=BCB_SGS_12
bank-flow.yield.accrual.cron=0 0 3 * * *
bank-flow.yield.zone-id=America/Sao_Paulo
bank-flow.outbox.producer-service=bank-flow-yield
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=bank-flow-yield
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.ack-mode=manual
spring.kafka.listener.auto-startup=false
management.otlp.metrics.export.enabled=false
