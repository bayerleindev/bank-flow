spring.application.name=bank-flow-yield

server.port=${SERVER_PORT:8090}

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/bank_flow?currentSchema=yield,public}
spring.datasource.username=${POSTGRES_USER:myuser}
spring.datasource.password=${POSTGRES_PASSWORD:mysecretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=yield
spring.flyway.default-schema=yield
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false

bank-flow.kafka.topics.yield-accruals=yield-accruals
bank-flow.kafka.topics.ledger-posting-created=ledger-posting-created
bank-flow.yield.cdi.base-url=${CDI_BASE_URL:https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados}
bank-flow.yield.cdi.percentage=${YIELD_CDI_PERCENTAGE:100}
bank-flow.yield.cdi.lookback-days=${CDI_LOOKBACK_DAYS:7}
bank-flow.yield.cdi.source=BCB_SGS_12
bank-flow.yield.accrual.cron=${YIELD_ACCRUAL_CRON:0 0 3 * * *}
bank-flow.yield.zone-id=${YIELD_ZONE_ID:America/Sao_Paulo}
bank-flow.outbox.producer-service=bank-flow-yield

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:bank-flow-yield}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=manual
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.template.observation-enabled=true
spring.kafka.producer.properties.max.block.ms=${KAFKA_PRODUCER_MAX_BLOCK_MS:30000}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.opentelemetry.tracing.sampler=always-on
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
management.otlp.metrics.export.enabled=false
logging.structured.format.console=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.structured.format.file=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.file.name=${LOG_FILE:../logs/${spring.application.name}.log}
logging.level.org.apache.kafka.clients.admin.internals.AdminMetadataManager=WARN
