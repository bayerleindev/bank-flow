nameOverride: bank-flow-yield

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

image:
  repository: gbcamargo/bank-flow-yield
  tag: 1.0.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8089

metrics:
  job: bank-flow-services

serviceMonitor:
  enabled: true
  namespace: "bank-flow"
  interval: 15s
  scrapeTimeout: 10s
  path: /actuator/prometheus
  labels:
    release: monitoring

probe:
  enabled: true
  namespace: "bank-flow"
  jobName: bank-flow-health
  module: http_2xx
  proberUrl: prometheus-blackbox-exporter.monitoring.svc:9115
  targetPath: /actuator/health
  interval: 15s
  scrapeTimeout: 10s
  labels:
    release: monitoring

env:
  SERVER_PORT: "8089"
  POSTGRES_URL: "jdbc:postgresql://host.docker.internal:5432/bank_flow?currentSchema=yield,public"
  KAFKA_BOOTSTRAP_SERVERS: "host.docker.internal:9094"
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  CDI_BASE_URL: "https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados"
  YIELD_CDI_PERCENTAGE: "100"
  CDI_LOOKBACK_DAYS: "7"
  YIELD_ACCRUAL_CRON: "0 0 3 * * *"
  YIELD_ZONE_ID: "America/Sao_Paulo"
  KAFKA_PRODUCER_MAX_BLOCK_MS: "30000"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
  MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
  BPL_JVM_THREAD_COUNT: "50"
  LOG_FILE: ""

secretEnv:
  POSTGRES_USER: "myuser"
  POSTGRES_PASSWORD: "mysecretpassword"

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi
