nameOverride: bank-flow-yield

replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1

image:
  repository: gbcamargo/bank-flow-yield
  tag: 1.1.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8089

metrics:
  job: bank-flow-services

serviceMonitor:
  enabled: true
  namespace: "bank-flow"
  interval: 15s
  scrapeTimeout: 10s
  path: /actuator/prometheus
  labels:
    release: monitoring

probe:
  enabled: true
  namespace: "bank-flow"
  jobName: bank-flow-health
  module: http_2xx
  proberUrl: prometheus-blackbox-exporter.monitoring.svc:9115
  targetPath: /actuator/health
  interval: 15s
  scrapeTimeout: 10s
  labels:
    release: monitoring

env:
  SERVER_PORT: "8089"
  POSTGRES_URL: "jdbc:postgresql://host.docker.internal:5432/bank_flow?currentSchema=yield,public"
  KAFKA_BOOTSTRAP_SERVERS: "host.docker.internal:9094"
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  CDI_BASE_URL: "https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados"
  YIELD_CDI_PERCENTAGE: "100"
  CDI_LOOKBACK_DAYS: "7"
  YIELD_ACCRUAL_CRON: "0 0 3 * * *"
  YIELD_ZONE_ID: "America/Sao_Paulo"
  KAFKA_PRODUCER_MAX_BLOCK_MS: "30000"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
  MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
  BPL_JVM_THREAD_COUNT: "50"
  HIKARI_MAXIMUM_POOL_SIZE: "3"
  HIKARI_MINIMUM_IDLE: "1"
  HIKARI_CONNECTION_TIMEOUT_MS: "2000"
  HIKARI_IDLE_TIMEOUT_MS: "600000"
  HIKARI_MAX_LIFETIME_MS: "1500000"
  HTTP_CLIENT_CONNECT_TIMEOUT_MS: "1000"
  HTTP_CLIENT_READ_TIMEOUT_MS: "5000"
  HTTP_RETRY_MAX_ATTEMPTS: "2"
  HTTP_RETRY_BACKOFF_MS: "500"
  HTTP_RETRY_MULTIPLIER: "2.0"
  HTTP_CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD: "50"
  HTTP_CIRCUIT_BREAKER_SLIDING_WINDOW_SIZE: "10"
  HTTP_CIRCUIT_BREAKER_MINIMUM_CALLS: "5"
  HTTP_CIRCUIT_BREAKER_OPEN_DURATION_MS: "60000"
  LOG_FILE: ""

secretEnv:
  POSTGRES_USER: "myuser"
  POSTGRES_PASSWORD: "mysecretpassword"

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi
