nameOverride: bank-flow-accounts

replicaCount: 1

image:
  repository: bank-flow-accounts
  tag: local
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8084

metrics:
  job: bank-flow-services

serviceMonitor:
  enabled: true
  namespace: ""
  interval: 15s
  scrapeTimeout: 10s
  path: /actuator/prometheus
  labels:
    release: monitoring

probe:
  enabled: true
  namespace: ""
  jobName: bank-flow-health
  module: http_2xx
  proberUrl: prometheus-blackbox-exporter.monitoring.svc:9115
  targetPath: /actuator/health
  interval: 15s
  scrapeTimeout: 10s
  labels:
    release: monitoring

env:
  SERVER_PORT: "8084"
  POSTGRES_URL: "jdbc:postgresql://host.minikube.internal:5432/bank_flow?currentSchema=accounts,public"
  KAFKA_BOOTSTRAP_SERVERS: "host.minikube.internal:9094"
  BAAS_MODE: "mock"
  BAAS_BASE_URL: "http://baas:9098"
  OUTBOX_PUBLISHER_FIXED_DELAY_MS: "1000"
  OUTBOX_PUBLISHER_BATCH_SIZE: "50"
  OUTBOX_PUBLISHER_LOCK_LEASE_MS: "60000"
  OUTBOX_PUBLISHER_SEND_TIMEOUT_MS: "30000"
  OUTBOX_PUBLISHER_MAX_ATTEMPTS: "10"
  KAFKA_PRODUCER_MAX_BLOCK_MS: "30000"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
  MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
  BPL_JVM_THREAD_COUNT: "50"
  LOG_FILE: ""

secretEnv:
  POSTGRES_USER: "myuser"
  POSTGRES_PASSWORD: "mysecretpassword"

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi
