spring.application.name=bank-flow-accounts

server.port=${SERVER_PORT:8084}

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/bank_flow?currentSchema=accounts,public}
spring.datasource.username=${POSTGRES_USER:myuser}
spring.datasource.password=${POSTGRES_PASSWORD:mysecretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=accounts
spring.flyway.default-schema=accounts
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false

bank-flow.baas.mode=${BAAS_MODE:mock}
bank-flow.baas.base-url=${BAAS_BASE_URL:http://localhost:9098}
bank-flow.kafka.topics.account-created=account-created
bank-flow.outbox.publisher.fixed-delay-ms=${OUTBOX_PUBLISHER_FIXED_DELAY_MS:1000}
bank-flow.outbox.publisher.batch-size=${OUTBOX_PUBLISHER_BATCH_SIZE:50}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.template.observation-enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.opentelemetry.tracing.sampler=always-on
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
management.otlp.metrics.export.enabled=false
logging.structured.format.console=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.structured.format.file=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.file.name=${LOG_FILE:../logs/${spring.application.name}.log}
