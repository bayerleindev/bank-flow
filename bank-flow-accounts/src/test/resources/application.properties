spring.datasource.url=jdbc:h2:mem:bank_flow_accounts;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS accounts\\;SET SCHEMA accounts
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=accounts
spring.flyway.default-schema=accounts
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false

bank-flow.baas.mode=mock
bank-flow.baas.base-url=http://localhost:9098
bank-flow.kafka.topics.account-created=account-created
bank-flow.outbox.producer-service=bank-flow-accounts
management.otlp.metrics.export.enabled=false
