spring.application.name=bank-flow-accounts-api
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_flow_accounts?currentSchema=accounts}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backend}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:backend}

spring.flyway.enabled=true
spring.flyway.schemas=accounts
spring.flyway.default-schema=accounts
spring.flyway.create-schemas=true

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH_JWT_ISSUER_URI:http://localhost:8090}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_JWKS_URI:http://localhost:8090/.well-known/jwks.json}

app.kafka.topics.account-requested=${ACCOUNT_REQUESTED_TOPIC:account.requested}
app.kafka.topics.account-created=${ACCOUNT_CREATED_TOPIC:account.created}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.export.otlp.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:14318/v1/traces}
management.observations.key-values.application=${spring.application.name}

resilience4j.retry.instances.kafkaPublish.max-attempts=3
resilience4j.retry.instances.kafkaPublish.wait-duration=200ms
resilience4j.retry.instances.kafkaPublish.enable-exponential-backoff=true
resilience4j.retry.instances.kafkaPublish.exponential-backoff-multiplier=2
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-size=100
resilience4j.circuitbreaker.instances.kafkaPublish.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.kafkaPublish.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaPublish.wait-duration-in-open-state=15s
