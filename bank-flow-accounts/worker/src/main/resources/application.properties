spring.application.name=bank-flow-accounts-worker
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_flow_accounts?currentSchema=accounts}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backend}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:backend}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${ACCOUNT_REQUESTED_CONSUMER_GROUP:bank-flow-accounts-worker}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=br.com.bankflow.accounts.shared.kafka,br.com.bankflow.accounts.shared.domain
spring.kafka.consumer.properties.spring.json.value.default.type=br.com.bankflow.accounts.shared.kafka.AccountRequestedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.topics.account-requested=${ACCOUNT_REQUESTED_TOPIC:account.requested}
app.kafka.topics.account-creation-requested=${ACCOUNT_CREATION_REQUESTED_TOPIC:account.creation.requested}
app.kafka.topics.account-requested-dlt=${ACCOUNT_REQUESTED_DLT_TOPIC:account.requested.dlt}
app.kafka.topics.account-validate-command=${ACCOUNT_VALIDATE_COMMAND_TOPIC:account.validate.command}
app.kafka.topics.account-validated-event=${ACCOUNT_VALIDATED_EVENT_TOPIC:account.validated.event}
app.kafka.consumer.account-requested.concurrency=${ACCOUNT_REQUESTED_CONCURRENCY:4}
app.kafka.consumer.account-creation-requested.concurrency=${ACCOUNT_CREATION_REQUESTED_CONCURRENCY:2}
app.kafka.consumer.account-validate.concurrency=${ACCOUNT_VALIDATE_CONCURRENCY:4}
app.kafka.consumer.account-requested.retry.max-attempts=${ACCOUNT_REQUESTED_RETRY_MAX_ATTEMPTS:5}
app.kafka.consumer.account-requested.retry.initial-interval-ms=${ACCOUNT_REQUESTED_RETRY_INITIAL_INTERVAL_MS:1000}
app.kafka.consumer.account-requested.retry.multiplier=${ACCOUNT_REQUESTED_RETRY_MULTIPLIER:2.0}
app.kafka.consumer.account-requested.retry.max-interval-ms=${ACCOUNT_REQUESTED_RETRY_MAX_INTERVAL_MS:30000}
app.baas.base-url=${BAAS_BASE_URL:http://localhost:8089}
app.baas.timeout=${BAAS_TIMEOUT:3s}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.export.otlp.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:14318/v1/traces}
management.observations.key-values.application=${spring.application.name}

resilience4j.retry.instances.baasAccountCreation.max-attempts=3
resilience4j.retry.instances.baasAccountCreation.wait-duration=500ms
resilience4j.retry.instances.baasAccountCreation.enable-exponential-backoff=true
resilience4j.retry.instances.baasAccountCreation.exponential-backoff-multiplier=2
resilience4j.retry.instances.baasAccountCreation.retry-exceptions=org.springframework.web.reactive.function.client.WebClientRequestException,org.springframework.web.reactive.function.client.WebClientResponseException$TooManyRequests,org.springframework.web.reactive.function.client.WebClientResponseException$BadGateway,org.springframework.web.reactive.function.client.WebClientResponseException$ServiceUnavailable,org.springframework.web.reactive.function.client.WebClientResponseException$GatewayTimeout
resilience4j.circuitbreaker.instances.baasAccountCreation.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.baasAccountCreation.sliding-window-size=100
resilience4j.circuitbreaker.instances.baasAccountCreation.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.baasAccountCreation.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.baasAccountCreation.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.baasAccountCreation.slow-call-rate-threshold=60
resilience4j.circuitbreaker.instances.baasAccountCreation.wait-duration-in-open-state=30s
resilience4j.bulkhead.instances.baasAccountCreation.max-concurrent-calls=32
resilience4j.bulkhead.instances.baasAccountCreation.max-wait-duration=250ms

resilience4j.bulkhead.instances.accountRequestedConsumer.max-concurrent-calls=4
resilience4j.bulkhead.instances.accountRequestedConsumer.max-wait-duration=0
resilience4j.circuitbreaker.instances.accountRequestedConsumer.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.accountRequestedConsumer.sliding-window-size=100
resilience4j.circuitbreaker.instances.accountRequestedConsumer.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.accountRequestedConsumer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.accountRequestedConsumer.wait-duration-in-open-state=30s

resilience4j.retry.instances.accountValidationPublish.max-attempts=3
resilience4j.retry.instances.accountValidationPublish.wait-duration=200ms
resilience4j.retry.instances.accountValidationPublish.enable-exponential-backoff=true
resilience4j.retry.instances.accountValidationPublish.exponential-backoff-multiplier=2
resilience4j.circuitbreaker.instances.accountValidationPublish.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.accountValidationPublish.sliding-window-size=100
resilience4j.circuitbreaker.instances.accountValidationPublish.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.accountValidationPublish.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.accountValidationPublish.wait-duration-in-open-state=30s

resilience4j.retry.instances.kafkaPublish.max-attempts=3
resilience4j.retry.instances.kafkaPublish.wait-duration=200ms
resilience4j.retry.instances.kafkaPublish.enable-exponential-backoff=true
resilience4j.retry.instances.kafkaPublish.exponential-backoff-multiplier=2
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-size=100
resilience4j.circuitbreaker.instances.kafkaPublish.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.kafkaPublish.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaPublish.wait-duration-in-open-state=30s
