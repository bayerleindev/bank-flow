spring.datasource.url=jdbc:tc:postgresql:15-alpine:///bank_flow?currentSchema=transfer,public
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=transfer
spring.flyway.default-schema=transfer
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false

bank-flow.kafka.topics.ledger-movements=ledger-movements
bank-flow.outbox.producer-service=bank-flow-transfer
management.otlp.metrics.export.enabled=false
