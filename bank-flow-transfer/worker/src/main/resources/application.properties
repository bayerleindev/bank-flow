spring.application.name=bank-flow-transfer-worker

server.port=${SERVER_PORT:8086}

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/bank_flow?currentSchema=transfer,public}
spring.datasource.username=${POSTGRES_USER:myuser}
spring.datasource.password=${POSTGRES_PASSWORD:mysecretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAXIMUM_POOL_SIZE:4}
spring.datasource.hikari.minimum-idle=${HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT_MS:2000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME_MS:1500000}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=transfer
spring.flyway.default-schema=transfer
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false

bank-flow.balance.base-url=${BALANCE_BASE_URL:http://localhost:8082}
bank-flow.accounts.base-url=${ACCOUNTS_BASE_URL:http://localhost:8084}
bank-flow.psp.mode=${PSP_MODE:mock}
bank-flow.psp.base-url=${PSP_BASE_URL:http://localhost:9099}
bank-flow.http.client.connect-timeout-ms=${HTTP_CLIENT_CONNECT_TIMEOUT_MS:500}
bank-flow.http.client.read-timeout-ms=${HTTP_CLIENT_READ_TIMEOUT_MS:1500}
bank-flow.resilience.http.retry.max-attempts=${HTTP_RETRY_MAX_ATTEMPTS:2}
bank-flow.resilience.http.retry.backoff-ms=${HTTP_RETRY_BACKOFF_MS:100}
bank-flow.resilience.http.retry.multiplier=${HTTP_RETRY_MULTIPLIER:2.0}
bank-flow.resilience.http.circuit-breaker.failure-rate-threshold=${HTTP_CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD:50}
bank-flow.resilience.http.circuit-breaker.sliding-window-size=${HTTP_CIRCUIT_BREAKER_SLIDING_WINDOW_SIZE:20}
bank-flow.resilience.http.circuit-breaker.minimum-calls=${HTTP_CIRCUIT_BREAKER_MINIMUM_CALLS:10}
bank-flow.resilience.http.circuit-breaker.open-duration-ms=${HTTP_CIRCUIT_BREAKER_OPEN_DURATION_MS:10000}
bank-flow.kafka.topics.ledger-movements=ledger-movements
bank-flow.kafka.topics.ledger-posting-created=ledger-posting-created
bank-flow.outbox.producer-service=bank-flow-transfer

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:bank-flow-transfer-worker}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.observation-enabled=true
spring.kafka.listener.concurrency=${KAFKA_LISTENER_CONCURRENCY:2}
bank-flow.kafka.retry.interval-ms=${KAFKA_RETRY_INTERVAL_MS:1000}
bank-flow.kafka.retry.max-attempts=${KAFKA_RETRY_MAX_ATTEMPTS:3}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=livenessState,db
management.metrics.tags.application=${spring.application.name}
management.metrics.enable.hikaricp=true
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.opentelemetry.tracing.sampler=always-on
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
management.otlp.metrics.export.enabled=false
logging.structured.format.console=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.structured.format.file=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.file.name=${LOG_FILE:../logs/${spring.application.name}.log}
logging.level.org.apache.kafka.clients.admin.internals.AdminMetadataManager=WARN
