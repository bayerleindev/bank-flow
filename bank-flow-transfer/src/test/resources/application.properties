spring.datasource.url=jdbc:h2:mem:bank_flow_transfer;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS transfer\\;SET SCHEMA transfer
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=transfer
spring.flyway.default-schema=transfer
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false

bank-flow.balance.base-url=http://localhost:8082
bank-flow.accounts.base-url=http://localhost:8084
bank-flow.psp.mode=mock
bank-flow.psp.base-url=http://localhost:9099
bank-flow.kafka.topics.ledger-movements=ledger-movements
bank-flow.kafka.topics.ledger-posting-created=ledger-posting-created
bank-flow.outbox.publisher.fixed-delay-ms=1000000
bank-flow.outbox.publisher.batch-size=10
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.consumer.group-id=bank-flow-transfer-test
spring.kafka.consumer.auto-offset-reset=earliest
bank-flow.kafka.retry.interval-ms=10
bank-flow.kafka.retry.max-attempts=1
management.otlp.metrics.export.enabled=false
