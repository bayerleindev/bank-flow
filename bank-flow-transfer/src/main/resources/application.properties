spring.application.name=bank-flow-transfer

server.port=${SERVER_PORT:8083}

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/bank_flow?currentSchema=transfer,public}
spring.datasource.username=${POSTGRES_USER:myuser}
spring.datasource.password=${POSTGRES_PASSWORD:mysecretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=transfer
spring.flyway.default-schema=transfer
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false

bank-flow.balance.base-url=${BALANCE_BASE_URL:http://localhost:8082}
bank-flow.accounts.base-url=${ACCOUNTS_BASE_URL:http://localhost:8084}
bank-flow.psp.mode=${PSP_MODE:mock}
bank-flow.psp.base-url=${PSP_BASE_URL:http://localhost:9099}
bank-flow.kafka.topics.ledger-movements=ledger-movements
bank-flow.kafka.topics.ledger-posting-created=ledger-posting-created
bank-flow.outbox.publisher.fixed-delay-ms=${OUTBOX_PUBLISHER_FIXED_DELAY_MS:1000}
bank-flow.outbox.publisher.batch-size=${OUTBOX_PUBLISHER_BATCH_SIZE:50}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:bank-flow-transfer}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
bank-flow.kafka.retry.interval-ms=${KAFKA_RETRY_INTERVAL_MS:1000}
bank-flow.kafka.retry.max-attempts=${KAFKA_RETRY_MAX_ATTEMPTS:3}
