management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: 'true'
      percentiles:
        http:
          server:
            requests: 0.5,0.95,0.99
    tags:
      application: ${spring.application.name}
    enable:
      hikaricp: 'true'
  opentelemetry:
    resource-attributes:
      service:
        name: ${spring.application.name}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
      sampler: always-on
  otlp:
    metrics:
      export:
        enabled: 'false'
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState,ping
      probes:
        enabled: 'true'
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
  tracing:
    enabled: true
    baggage:
      remote-fields:
        - transfer_id
      correlation:
        fields:
          - transfer_id
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
spring:
  flyway:
    enabled: 'true'
    schemas: transfer
    locations: classpath:db/migration
    baseline-on-migrate: 'false'
    default-schema: transfer
    create-schemas: 'true'
  datasource:
    hikari:
      idle-timeout: ${HIKARI_IDLE_TIMEOUT_MS:600000}
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:8}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:2000}
      max-lifetime: ${HIKARI_MAX_LIFETIME_MS:1500000}
      minimum-idle: ${HIKARI_MINIMUM_IDLE:2}
    password: ${POSTGRES_PASSWORD:mysecretpassword}
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/bank_flow?currentSchema=transfer,public}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:myuser}
  application:
    name: bank-flow-transfer-api
bank-flow:
  resilience:
    http:
      retry:
        max-attempts: ${HTTP_RETRY_MAX_ATTEMPTS:2}
        multiplier: ${HTTP_RETRY_MULTIPLIER:2.0}
        backoff-ms: ${HTTP_RETRY_BACKOFF_MS:100}
      circuit-breaker:
        failure-rate-threshold: ${HTTP_CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD:50}
        minimum-calls: ${HTTP_CIRCUIT_BREAKER_MINIMUM_CALLS:10}
        open-duration-ms: ${HTTP_CIRCUIT_BREAKER_OPEN_DURATION_MS:10000}
        sliding-window-size: ${HTTP_CIRCUIT_BREAKER_SLIDING_WINDOW_SIZE:20}
  psp:
    mode: ${PSP_MODE:mock}
    base-url: ${PSP_BASE_URL:http://localhost:9099}
  kafka:
    topics:
      ledger-movements: ledger-movements
  outbox:
    producer-service: bank-flow-transfer
    metrics:
      enabled: 'false'
  accounts:
    base-url: ${ACCOUNTS_BASE_URL:http://localhost:8084}
  balance:
    base-url: ${BALANCE_BASE_URL:http://localhost:8082}
  http:
    client:
      read-timeout-ms: ${HTTP_CLIENT_READ_TIMEOUT_MS:1500}
      connect-timeout-ms: ${HTTP_CLIENT_CONNECT_TIMEOUT_MS:500}
logging:
  pattern:
    level: "%5p [${spring.application.name:},trace_id=%X{traceId:-},span_id=%X{spanId:-},transfer_id=%X{transfer_id:-}]"
server:
  port: ${SERVER_PORT:8083}
