nameOverride: bank-flow-transfer

metrics:
  job: bank-flow-services

serviceMonitor:
  enabled: true
  namespace: "bank-flow"
  interval: 15s
  scrapeTimeout: 10s
  path: /actuator/prometheus
  labels:
    release: monitoring

probe:
  enabled: true
  namespace: "bank-flow"
  jobName: bank-flow-health
  module: http_2xx
  proberUrl: prometheus-blackbox-exporter.monitoring.svc:9115
  targetPath: /actuator/health
  interval: 15s
  scrapeTimeout: 10s
  labels:
    release: monitoring

commonEnv:
  POSTGRES_URL: "jdbc:postgresql://host.docker.internal:5432/bank_flow?currentSchema=transfer,public"
  ACCOUNTS_BASE_URL: "http://bank-flow-accounts:8084"
  BALANCE_BASE_URL: "http://bank-flow-balance-api:8082"
  PSP_MODE: "mock"
  PSP_BASE_URL: "http://psp:9099"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
  MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
  BPL_JVM_THREAD_COUNT: "50"
  HIKARI_CONNECTION_TIMEOUT_MS: "2000"
  HIKARI_IDLE_TIMEOUT_MS: "600000"
  HIKARI_MAX_LIFETIME_MS: "1500000"
  HTTP_CLIENT_CONNECT_TIMEOUT_MS: "500"
  HTTP_CLIENT_READ_TIMEOUT_MS: "1500"
  HTTP_RETRY_MAX_ATTEMPTS: "2"
  HTTP_RETRY_BACKOFF_MS: "100"
  HTTP_RETRY_MULTIPLIER: "2.0"
  HTTP_CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD: "50"
  HTTP_CIRCUIT_BREAKER_SLIDING_WINDOW_SIZE: "20"
  HTTP_CIRCUIT_BREAKER_MINIMUM_CALLS: "10"
  HTTP_CIRCUIT_BREAKER_OPEN_DURATION_MS: "10000"
  LOG_FILE: ""

secretEnv:
  POSTGRES_USER: "myuser"
  POSTGRES_PASSWORD: "mysecretpassword"

components:
  api:
    enabled: true
    name: bank-flow-transfer-api
    replicaCount: 1
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 65
      targetMemoryUtilizationPercentage: 75
    keda:
      enabled: false
    pdb:
      enabled: true
      minAvailable: 1
    image:
      repository: gbcamargo/bank-flow-transfer-api
      tag: 1.1.1
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8083
    env:
      SERVER_PORT: "8083"
      HIKARI_MAXIMUM_POOL_SIZE: "8"
      HIKARI_MINIMUM_IDLE: "2"
    readinessProbe:
      path: /actuator/health/readiness
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    livenessProbe:
      path: /actuator/health/liveness
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        cpu: 150m
        memory: 384Mi
      limits:
        cpu: 750m
        memory: 768Mi

  worker:
    enabled: true
    name: bank-flow-transfer-worker
    replicaCount: 1
    autoscaling:
      enabled: false
    keda:
      enabled: true
      minReplicaCount: 1
      maxReplicaCount: 6
      pollingInterval: 30
      cooldownPeriod: 180
      triggers:
        - type: kafka
          metadata:
            bootstrapServers: "host.docker.internal:9094"
            consumerGroup: "bank-flow-transfer-worker"
            topic: "ledger-posting-created"
            lagThreshold: "50"
            activationLagThreshold: "10"
            offsetResetPolicy: latest
            allowIdleConsumers: "false"
            scaleToZeroOnInvalidOffset: "false"
            excludePersistentLag: "false"
            limitToPartitionsWithLag: "false"
            ensureEvenDistributionOfPartitions: "false"
            version: 1.0.0
    pdb:
      enabled: true
      maxUnavailable: 1
    image:
      repository: gbcamargo/bank-flow-transfer-worker
      tag: 1.1.1
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8086
    env:
      SERVER_PORT: "8086"
      KAFKA_BOOTSTRAP_SERVERS: "host.docker.internal:9094"
      KAFKA_CONSUMER_GROUP_ID: "bank-flow-transfer-worker"
      KAFKA_AUTO_OFFSET_RESET: "earliest"
      KAFKA_RETRY_INTERVAL_MS: "1000"
      KAFKA_RETRY_MAX_ATTEMPTS: "3"
      KAFKA_LISTENER_CONCURRENCY: "2"
      HIKARI_MAXIMUM_POOL_SIZE: "4"
      HIKARI_MINIMUM_IDLE: "1"
      BANK_FLOW_KAFKA_LAG_ENABLED: "false"
    readinessProbe:
      path: /actuator/health/readiness
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    livenessProbe:
      path: /actuator/health/liveness
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        cpu: 150m
        memory: 384Mi
      limits:
        cpu: 750m
        memory: 768Mi
