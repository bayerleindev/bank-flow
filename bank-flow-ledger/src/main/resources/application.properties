spring.application.name=bank-flow-ledger

server.port=${SERVER_PORT:8085}

bank-flow.kafka.topics.account-created=account-created
bank-flow.kafka.topics.ledger-movements=ledger-movements
bank-flow.kafka.topics.ledger-reversals=ledger-reversals
bank-flow.kafka.topics.ledger-posting-created=ledger-posting-created
bank-flow.kafka.retry.interval-ms=1000
bank-flow.kafka.retry.max-attempts=3
bank-flow.id-generator.worker-id=${ID_GENERATOR_WORKER_ID:0}

bank-flow.immudb.enabled=${IMMUDB_ENABLED:true}
bank-flow.immudb.host=${IMMUDB_HOST:localhost}
bank-flow.immudb.port=${IMMUDB_PORT:3322}
bank-flow.immudb.database=${IMMUDB_DATABASE:ledger}
bank-flow.immudb.username=${IMMUDB_USERNAME:immudb}
bank-flow.immudb.password=${IMMUDB_PASSWORD:immudb}

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=bank-flow-ledger
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:latest}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.listener.observation-enabled=true
spring.kafka.template.observation-enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.opentelemetry.tracing.sampler=always-on
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
management.otlp.metrics.export.enabled=false
logging.structured.format.console=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.structured.format.file=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.file.name=${LOG_FILE:../logs/${spring.application.name}.log}
