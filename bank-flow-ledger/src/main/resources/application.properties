spring.application.name=bank-flow-ledger
server.port=${SERVER_PORT:8086}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:bank-flow-ledger}
spring.kafka.consumer.auto-offset-reset=${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=br.com.bankflow.ledger.kafka
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=br.com.bankflow.ledger.kafka.AccountCreatedEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.topics.account-created=${ACCOUNT_CREATED_TOPIC:account.created}
app.kafka.topics.movement-created=${MOVEMENT_CREATED_TOPIC:movement.created}
app.kafka.topics.ledger-journal-created=${LEDGER_JOURNAL_CREATED_TOPIC:ledger.journal.created}
app.kafka.consumer.account-created.concurrency=${ACCOUNT_CREATED_CONCURRENCY:3}
app.kafka.consumer.movement-created.concurrency=${MOVEMENT_CREATED_CONCURRENCY:3}
app.kafka.consumer.max-poll-records=${KAFKA_MAX_POLL_RECORDS:100}
app.kafka.consumer.retry.max-attempts=${KAFKA_RETRY_MAX_ATTEMPTS:3}
app.kafka.consumer.retry.initial-interval-ms=${KAFKA_RETRY_INITIAL_INTERVAL_MS:500}
app.kafka.consumer.retry.multiplier=${KAFKA_RETRY_MULTIPLIER:2.0}
app.kafka.consumer.retry.max-interval-ms=${KAFKA_RETRY_MAX_INTERVAL_MS:5000}

app.immudb.host=${IMMUDB_HOST:localhost}
app.immudb.port=${IMMUDB_PORT:3322}
app.immudb.username=${IMMUDB_USERNAME:immudb}
app.immudb.password=${IMMUDB_PASSWORD:immudb}
app.immudb.database=${IMMUDB_DATABASE:defaultdb}
app.ledger.default-currency=${LEDGER_DEFAULT_CURRENCY:BRL}
app.ledger.external-settlement-account-id=${LEDGER_EXTERNAL_SETTLEMENT_ACCOUNT_ID:00000000-0000-0000-0000-000000000001}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.tracing.enabled=true
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=${OTLP_METRICS_ENABLED:false}
management.metrics.tags.application=${spring.application.name}
management.observations.key-values.application=${spring.application.name}
