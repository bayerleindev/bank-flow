spring.kafka.listener.auto-startup=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=bank-flow-ledger-test
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

bank-flow.kafka.topics.account-created=account-created
bank-flow.kafka.topics.ledger-movements=ledger-movements
bank-flow.kafka.topics.ledger-reversals=ledger-reversals
bank-flow.kafka.topics.ledger-posting-created=ledger-posting-created
bank-flow.kafka.retry.interval-ms=1000
bank-flow.kafka.retry.max-attempts=3

bank-flow.immudb.enabled=false
bank-flow.immudb.host=localhost
bank-flow.immudb.port=3322
bank-flow.immudb.database=defaultdb
bank-flow.immudb.username=immudb
bank-flow.immudb.password=immudb
