nameOverride: bank-flow-ledger

replicaCount: 3

keda:
  enabled: true
  minReplicaCount: 2
  maxReplicaCount: 4
  pollingInterval: 30
  cooldownPeriod: 180
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: "host.docker.internal:9094"
        consumerGroup: "bank-flow-ledger"
        topic: "account-created"
        lagThreshold: "50"
        activationLagThreshold: "10"
        offsetResetPolicy: latest
        allowIdleConsumers: "false"
        scaleToZeroOnInvalidOffset: "false"
        excludePersistentLag: "false"
        limitToPartitionsWithLag: "false"
        ensureEvenDistributionOfPartitions: "false"
        version: 1.0.0
    - type: kafka
      metadata:
        bootstrapServers: "host.docker.internal:9094"
        consumerGroup: "bank-flow-ledger"
        topic: "ledger-movements"
        lagThreshold: "50"
        activationLagThreshold: "10"
        offsetResetPolicy: latest
        allowIdleConsumers: "false"
        scaleToZeroOnInvalidOffset: "false"
        excludePersistentLag: "false"
        limitToPartitionsWithLag: "false"
        ensureEvenDistributionOfPartitions: "false"
        version: 1.0.0
    - type: kafka
      metadata:
        bootstrapServers: "host.docker.internal:9094"
        consumerGroup: "bank-flow-ledger"
        topic: "ledger-reversals"
        lagThreshold: "25"
        activationLagThreshold: "5"
        offsetResetPolicy: latest
        allowIdleConsumers: "false"
        scaleToZeroOnInvalidOffset: "false"
        excludePersistentLag: "false"
        limitToPartitionsWithLag: "false"
        ensureEvenDistributionOfPartitions: "false"
        version: 1.0.0
    - type: kafka
      metadata:
        bootstrapServers: "host.docker.internal:9094"
        consumerGroup: "bank-flow-ledger"
        topic: "yield-accruals"
        lagThreshold: "25"
        activationLagThreshold: "5"
        offsetResetPolicy: latest
        allowIdleConsumers: "false"
        scaleToZeroOnInvalidOffset: "false"
        excludePersistentLag: "false"
        limitToPartitionsWithLag: "false"
        ensureEvenDistributionOfPartitions: "false"
        version: 1.0.0

pdb:
  enabled: true
  maxUnavailable: 1

image:
  repository: gbcamargo/bank-flow-ledger
  tag: 1.1.1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8085

metrics:
  job: bank-flow-services

serviceMonitor:
  enabled: true
  namespace: "bank-flow"
  interval: 15s
  scrapeTimeout: 10s
  path: /actuator/prometheus
  labels:
    release: monitoring

probe:
  enabled: true
  namespace: "bank-flow"
  jobName: bank-flow-health
  module: http_2xx
  proberUrl: prometheus-blackbox-exporter.monitoring.svc:9115
  targetPath: /actuator/health
  interval: 15s
  scrapeTimeout: 10s
  labels:
    release: monitoring

env:
  SERVER_PORT: "8085"
  KAFKA_BOOTSTRAP_SERVERS: "host.docker.internal:9094"
  KAFKA_CONSUMER_GROUP_ID: "bank-flow-ledger"
  KAFKA_AUTO_OFFSET_RESET: "latest"
  KAFKA_RETRY_INTERVAL_MS: "1000"
  KAFKA_RETRY_MAX_ATTEMPTS: "3"
  IMMUDB_ENABLED: "true"
  IMMUDB_HOST: "host.docker.internal"
  IMMUDB_PORT: "3322"
  IMMUDB_DATABASE: "ledger"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
  MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
  BPL_JVM_THREAD_COUNT: "50"
  KAFKA_LISTENER_CONCURRENCY: "3"
  LOG_FILE: ""
  BANK_FLOW_KAFKA_LAG_ENABLED: "false"
  INTEREST_EXPENSE_DIGITAL_ACCOUNT_ID: "00000000-0000-0000-0000-000000000200"

secretEnv:
  IMMUDB_USERNAME: "immudb"
  IMMUDB_PASSWORD: "immudb"

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

development:
  useMinikubeHost: true
