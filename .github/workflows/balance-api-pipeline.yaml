name: Balance API Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: bank-flow-balance-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bank-flow-balance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run API tests
        run: ./gradlew :api:test

      - name: Build API jar
        run: ./gradlew :api:bootJar
