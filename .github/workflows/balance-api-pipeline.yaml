name: Balance API Tests

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
  workflow_dispatch:

env:
  DOCKER_REGISTRY_NAMESPACE: ${{ vars.DOCKER_REGISTRY_NAMESPACE || 'gbcamargo' }}

jobs:
  test:
    name: bank-flow-balance-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bank-flow-balance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run API tests
        run: ./gradlew :api:test

      - name: Build API jar
        run: ./gradlew :api:bootJar

      - name: Compute image tag
        id: image
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        run: ./gradlew :api:bootBuildImage --imageName=bank-flow-balance-api:${{ steps.image.outputs.tag }}

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag API image
        run: |
          docker tag bank-flow-balance-api:${{ steps.image.outputs.tag }} $DOCKER_REGISTRY_NAMESPACE/bank-flow-balance-api:${{ steps.image.outputs.tag }}
          docker tag bank-flow-balance-api:${{ steps.image.outputs.tag }} $DOCKER_REGISTRY_NAMESPACE/bank-flow-balance-api:latest

      - name: Push API image
        run: |
          docker push $DOCKER_REGISTRY_NAMESPACE/bank-flow-balance-api:${{ steps.image.outputs.tag }}
          docker push $DOCKER_REGISTRY_NAMESPACE/bank-flow-balance-api:latest
