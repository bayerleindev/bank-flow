spring.application.name=bank-flow-onboarding-api
server.port=${SERVER_PORT:8091}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_flow_onboarding?currentSchema=onboarding}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backend}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:backend}

spring.flyway.enabled=true
spring.flyway.schemas=onboarding
spring.flyway.default-schema=onboarding
spring.flyway.create-schemas=true

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.auth.base-url=${AUTH_BASE_URL:http://localhost:8090}
app.auth.timeout=${AUTH_TIMEOUT:3s}
app.auth.issuer-key=${AUTH_ISSUER_KEY:local-dev-issuer-key}
app.kafka.topics.onboarding-approved=${ONBOARDING_APPROVED_TOPIC:onboarding.application.approved}
app.kafka.topics.account-creation-requested=${ACCOUNT_CREATION_REQUESTED_TOPIC:account.creation.requested}
app.onboarding.application-token-ttl=${ONBOARDING_APPLICATION_TOKEN_TTL:24h}
app.rustfs.endpoint=${RUSTFS_ENDPOINT:http://localhost:9000}
app.rustfs.presigned-endpoint=${RUSTFS_PRESIGNED_ENDPOINT:${app.rustfs.endpoint}}
app.rustfs.region=${RUSTFS_REGION:us-east-1}
app.rustfs.access-key=${RUSTFS_ACCESS_KEY:rustfs}
app.rustfs.secret-key=${RUSTFS_SECRET_KEY:rustfs123}
app.rustfs.bucket=${RUSTFS_BUCKET:bank-flow-onboarding-documents}
app.rustfs.presigned-upload-ttl=${RUSTFS_PRESIGNED_UPLOAD_TTL:15m}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.export.otlp.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:14318/v1/traces}
management.observations.key-values.application=${spring.application.name}

resilience4j.retry.instances.kafkaPublish.max-attempts=3
resilience4j.retry.instances.kafkaPublish.wait-duration=200ms
resilience4j.retry.instances.kafkaPublish.enable-exponential-backoff=true
resilience4j.retry.instances.kafkaPublish.exponential-backoff-multiplier=2
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-size=100
resilience4j.circuitbreaker.instances.kafkaPublish.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.kafkaPublish.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaPublish.wait-duration-in-open-state=15s
