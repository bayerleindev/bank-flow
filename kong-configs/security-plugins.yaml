apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: bank-flow-security-headers
  namespace: bank-flow
plugin: response-transformer
config:
  add:
    headers:
      - X-Content-Type-Options:nosniff
      - X-Frame-Options:DENY
      - Referrer-Policy:no-referrer
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: bank-flow-correlation-id
  namespace: bank-flow
plugin: correlation-id
config:
  header_name: X-Correlation-Id
  generator: uuid
  echo_downstream: true
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: bank-flow-request-size-limiting
  namespace: bank-flow
plugin: request-size-limiting
config:
  allowed_payload_size: 1
  size_unit: megabytes
  require_content_length: false
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: bank-flow-cors
  namespace: bank-flow
plugin: cors
config:
  origins:
    - "*"
  methods:
    - GET
    - POST
    - OPTIONS
  headers:
    - Accept
    - Authorization
    - Content-Type
    - Idempotency-Key
    - X-Correlation-Id
    - apikey
  exposed_headers:
    - X-Correlation-Id
    - X-RateLimit-Limit-Minute
    - X-RateLimit-Remaining-Minute
    - Retry-After
  credentials: false
  max_age: 3600
  preflight_continue: false
---
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: bank-flow-kong-prometheus
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    global: "true"
plugin: prometheus
config:
  status_code_metrics: true
  latency_metrics: true
  bandwidth_metrics: true
  upstream_health_metrics: true
