apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bank-flow-ingress
  namespace: default
  annotations:
    konghq.com/strip-path: "true"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /transfer
            pathType: Prefix
            backend:
              service:
                name: bank-flow-transfer-api
                port:
                  number: 8083
