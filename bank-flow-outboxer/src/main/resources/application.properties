spring.application.name=bank-flow-outboxer

server.port=${SERVER_PORT:8088}

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/bank_flow?currentSchema=outboxer,public}
spring.datasource.username=${POSTGRES_USER:myuser}
spring.datasource.password=${POSTGRES_PASSWORD:mysecretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAXIMUM_POOL_SIZE:4}
spring.datasource.hikari.minimum-idle=${HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT_MS:2000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME_MS:1500000}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=outboxer
spring.flyway.default-schema=outboxer
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false

bank-flow.outbox.publisher.fixed-delay-ms=${OUTBOX_PUBLISHER_FIXED_DELAY_MS:1000}
bank-flow.outbox.publisher.batch-size=${OUTBOX_PUBLISHER_BATCH_SIZE:50}
bank-flow.outbox.publisher.lock-lease-ms=${OUTBOX_PUBLISHER_LOCK_LEASE_MS:60000}
bank-flow.outbox.publisher.send-timeout-ms=${OUTBOX_PUBLISHER_SEND_TIMEOUT_MS:30000}
bank-flow.outbox.publisher.max-attempts=${OUTBOX_PUBLISHER_MAX_ATTEMPTS:10}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.template.observation-enabled=false
spring.kafka.producer.properties.max.block.ms=${KAFKA_PRODUCER_MAX_BLOCK_MS:30000}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db
management.metrics.tags.application=${spring.application.name}
management.metrics.enable.hikaricp=true
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.opentelemetry.tracing.sampler=always-on
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
management.otlp.metrics.export.enabled=false
logging.structured.format.console=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.structured.format.file=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.file.name=${LOG_FILE:../logs/${spring.application.name}.log}
logging.level.org.apache.kafka.clients.admin.internals.AdminMetadataManager=WARN
