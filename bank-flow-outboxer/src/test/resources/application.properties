spring.datasource.url=jdbc:h2:mem:bank_flow_outboxer;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS outboxer\\;SET SCHEMA outboxer
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=outboxer
spring.flyway.default-schema=outboxer
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false

bank-flow.outbox.publisher.fixed-delay-ms=1000000
bank-flow.outbox.publisher.batch-size=10
bank-flow.outbox.publisher.lock-lease-ms=60000
bank-flow.outbox.publisher.send-timeout-ms=30000
bank-flow.outbox.publisher.max-attempts=10
spring.kafka.bootstrap-servers=localhost:9092
management.otlp.metrics.export.enabled=false
