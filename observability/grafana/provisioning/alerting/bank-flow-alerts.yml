apiVersion: 1

groups:
  - orgId: 1
    name: Bank Flow Platform Alerts
    folder: Bank Flow Alerts
    interval: 1m
    rules:
      - uid: bank-flow-service-down
        title: Bank Flow service down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              editorMode: code
              expr: 1 - up{job="bank-flow-services", service!=""}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 2m
        annotations:
          summary: Service {{ $labels.service }} is down
          description: Prometheus target for {{ $labels.service }} has been down for at least 2 minutes.
        labels:
          severity: critical
          category: availability
          owner_service: platform

      - uid: bank-flow-http-5xx-high
        title: Bank Flow HTTP 5xx rate high
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              editorMode: code
              expr: sum by (service) (rate(http_server_requests_seconds_count{job="bank-flow-services", service!="", status=~"5..", uri!~"/actuator.*"}[5m])) / clamp_min(sum by (service) (rate(http_server_requests_seconds_count{job="bank-flow-services", service!="", uri!~"/actuator.*"}[5m])), 0.001)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.05
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: High HTTP 5xx ratio on {{ $labels.service }}
          description: HTTP 5xx ratio is above 5% for 5 minutes.
        labels:
          severity: warning
          category: http
          owner_service: platform

      - uid: bank-flow-http-latency-p95-high
        title: Bank Flow HTTP p95 latency high
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              editorMode: code
              expr: histogram_quantile(0.95, sum by (le, service) (rate(http_server_requests_seconds_bucket{job="bank-flow-services", service!="", uri!~"/actuator.*"}[5m])))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: High HTTP p95 latency on {{ $labels.service }}
          description: HTTP p95 latency is above 1 second for 5 minutes.
        labels:
          severity: warning
          category: http
          owner_service: platform

      - uid: bank-flow-kafka-consumer-lag-high
        title: Bank Flow Kafka consumer lag high
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              editorMode: code
              expr: sum by (consumergroup, topic) (kafka_consumergroup_lag_sum)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 100
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: Kafka lag high for {{ $labels.consumergroup }} on {{ $labels.topic }}
          description: Kafka consumer lag is above 100 messages for 5 minutes.
        labels:
          severity: warning
          category: kafka
          owner_service: platform

      - uid: bank-flow-dlq-records-detected
        title: Bank Flow DLQ records detected
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              editorMode: code
              expr: sum by (service, source_topic, dlq_topic) (increase(kafka_dlq_records_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: DLQ records detected for {{ $labels.service }}
          description: New records were sent to {{ $labels.dlq_topic }} from {{ $labels.source_topic }}.
        labels:
          severity: critical
          category: kafka
          owner_service: platform

  - orgId: 1
    name: Bank Flow Domain Alerts
    folder: Bank Flow Alerts
    interval: 1m
    rules:
      - uid: bank-flow-outbox-oldest-pending-high
        title: Bank Flow outbox oldest pending age high
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              editorMode: code
              expr: max by (service) (outbox_oldest_pending_event_age_seconds)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 120
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 3m
        annotations:
          summary: Outbox pending event is old for {{ $labels.service }}
          description: Oldest pending outbox event is above 120 seconds for 3 minutes.
        labels:
          severity: warning
          category: outbox
          owner_service: bank-flow-outboxer

      - uid: bank-flow-balance-projection-lag-high
        title: Bank Flow balance projection lag high
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              editorMode: code
              expr: max by (service) (balance_projection_lag_seconds)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 300
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: Balance projection lag is high
          description: Balance projection lag is above 300 seconds for 5 minutes.
        labels:
          severity: warning
          category: business
          owner_service: bank-flow-balance

      - uid: bank-flow-transfer-stuck-status
        title: Bank Flow transfers stuck in intermediate status
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              editorMode: code
              expr: max by (status) (transfer_oldest_in_status_age_seconds{status=~"RECEIVED|HOLD_CREATED|PSP_PENDING|PSP_CONFIRMED|POSTING_REQUESTED"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 300
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: Transfers are stuck in {{ $labels.status }}
          description: Oldest transfer in an intermediate status is above 300 seconds for 5 minutes.
        labels:
          severity: warning
          category: business
          owner_service: bank-flow-transfer
