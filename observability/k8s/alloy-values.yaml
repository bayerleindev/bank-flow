controller:
  type: daemonset

alloy:
  clustering:
    enabled: true
  configMap:
    create: true
    content: |-
      logging {
        level = "info"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "application"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_part_of"]
          target_label  = "stack"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.process.bank_flow.receiver]
      }

      loki.process "bank_flow" {
        stage.cri {}

        stage.json {
          expressions = {
            application = "application_name",
            level       = "level",
            logger      = "logger_name",
            message     = "message",
            trace_id    = "traceId",
            span_id     = "spanId",
            transaction_id                 = "transaction_id",
            transfer_id                    = "transfer_id",
            account_id                     = "account_id",
            source_digital_account_id      = "source_digital_account_id",
            destination_digital_account_id = "destination_digital_account_id",
            external_id                    = "external_id",
            entry_id                       = "entry_id",
            event_name                     = "event_name",
          }
        }

        stage.labels {
          values = {
            application = "",
            level       = "",
            logger      = "",
            trace_id    = "",
            span_id     = "",
            transaction_id                 = "",
            transfer_id                    = "",
            account_id                     = "",
            source_digital_account_id      = "",
            destination_digital_account_id = "",
            external_id                    = "",
            entry_id                       = "",
            event_name                     = "",
          }
        }

        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }
