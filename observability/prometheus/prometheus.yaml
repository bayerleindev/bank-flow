global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: tempo
    static_configs:
      - targets:
          - tempo:3200

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345

  - job_name: accounts-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: accounts-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081

  - job_name: transfers-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8083

  - job_name: transfers-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8084

  - job_name: ledger
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8086

  - job_name: balance-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8087

  - job_name: balance-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8088

  - job_name: auth-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8090

  - job_name: onboarding-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8091

  - job_name: auth-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8092
