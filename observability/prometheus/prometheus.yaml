global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: tempo
    static_configs:
      - targets:
          - tempo:3200

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345

  - job_name: accounts-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: accounts-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081
