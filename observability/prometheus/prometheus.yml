global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: bank-flow-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8085
          - host.docker.internal:8082
          - host.docker.internal:8083
          - host.docker.internal:8084
        labels:
          stack: bank-flow

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: immudb
    static_configs:
      - targets: ["host.docker.internal:9497"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
