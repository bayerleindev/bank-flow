global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: bank-flow-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8085
        labels:
          stack: bank-flow
          service: bank-flow-ledger
      - targets:
          - host.docker.internal:8082
        labels:
          stack: bank-flow
          service: bank-flow-balance
      - targets:
          - host.docker.internal:8083
        labels:
          stack: bank-flow
          service: bank-flow-transfer
      - targets:
          - host.docker.internal:8086
        labels:
          stack: bank-flow
          service: bank-flow-transfer-worker
      - targets:
          - host.docker.internal:8084
        labels:
          stack: bank-flow
          service: bank-flow-accounts
      - targets:
          - host.docker.internal:8088
        labels:
          stack: bank-flow
          service: bank-flow-outboxer
      - targets:
          - host.docker.internal:8087
        labels:
          stack: bank-flow
          service: bank-flow-balance-worker
      - targets:
          - host.docker.internal:8090
        labels:
          stack: bank-flow
          service: bank-flow-yield

  - job_name: bank-flow-health
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:8085/actuator/health
        labels:
          stack: bank-flow
          service: bank-flow-ledger
      - targets:
          - http://host.docker.internal:8082/actuator/health
        labels:
          stack: bank-flow
          service: bank-flow-balance
      - targets:
          - http://host.docker.internal:8083/actuator/health
        labels:
          stack: bank-flow
          service: bank-flow-transfer
      - targets:
          - http://host.docker.internal:8084/actuator/health
        labels:
          stack: bank-flow
          service: bank-flow-accounts
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: immudb
    static_configs:
      - targets: ["host.docker.internal:9497"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
