server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: bank-flow-local-files
    static_configs:
      - targets: ["localhost"]
        labels:
          job: bank-flow-local
          __path__: /var/log/bank-flow/*.log
    pipeline_stages:
      - json:
          expressions:
            application: application_name
            level: level
            logger: logger_name
            message: message
            trace_id: traceId
            span_id: spanId
      - labels:
          application:
          level:
          logger:
          trace_id:
      - output:
          source: message

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "compose_service"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
            trace_id: traceId
            span_id: spanId
      - labels:
          level:
          logger:
          trace_id:
      - output:
          source: message
