server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1048576
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: local
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  processor:
    service_graphs:
      wait: 10s
      max_items: 10000
      workers: 10
      enable_client_server_prefix: true
      peer_attributes:
        - peer.service
        - server.address
        - messaging.destination.name
        - messaging.destination
        - messaging.source.name
        - messaging.kafka.topic
      dimensions:
        - messaging.system
        - messaging.destination.name
        - messaging.destination
        - messaging.source.name
        - messaging.operation
    span_metrics:
      dimensions:
        - http.request.method
        - http.response.status_code
        - messaging.system
        - messaging.destination.name
        - messaging.destination
        - messaging.source.name
        - messaging.operation
        - account.status

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
