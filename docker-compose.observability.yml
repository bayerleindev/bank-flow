services:
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: bankflow-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bankflow-network

  grafana:
    image: grafana/grafana:11.4.0
    container_name: bankflow-grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - bankflow-network

  loki:
    image: grafana/loki:3.3.2
    container_name: bankflow-loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - bankflow-network

  promtail:
    image: grafana/promtail:3.3.2
    container_name: bankflow-promtail
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./observability/loki/promtail.yml:/etc/promtail/promtail.yml:ro
      - ./logs:/var/log/bank-flow:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - bankflow-network

  tempo:
    image: grafana/tempo:2.6.1
    container_name: bankflow-tempo
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    networks:
      - bankflow-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: bankflow-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://myuser:mysecretpassword@db:5432/bank_flow?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - bankflow-network

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: bankflow-kafka-exporter
    command:
      - --kafka.server=kafka:29092
    ports:
      - "9308:9308"
    networks:
      - bankflow-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: bankflow-cadvisor
    privileged: true
    ports:
      - "8089:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - bankflow-network

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  bankflow-network:
    external: true
    name: bankflow-network
