spring.application.name=bank-flow-transfers-worker
server.port=${SERVER_PORT:8084}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_flow_transfers?currentSchema=transfers}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backend}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:backend}

spring.flyway.enabled=true
spring.flyway.schemas=transfers
spring.flyway.default-schema=transfers
spring.flyway.create-schemas=true

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:bank-flow-transfers-worker}
spring.kafka.consumer.auto-offset-reset=${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=br.com.bankflow.transfers.shared.kafka,br.com.bankflow.transfers.shared.domain
spring.kafka.consumer.properties.spring.json.value.default.type=br.com.bankflow.transfers.shared.kafka.TransferRequestedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.ack-mode=record

app.kafka.topics.transfer-requested=${TRANSFER_REQUESTED_TOPIC:transfer.requested}
app.kafka.topics.account-validate-command=${ACCOUNT_VALIDATE_COMMAND_TOPIC:account.validate.command}
app.kafka.topics.account-validated-event=${ACCOUNT_VALIDATED_EVENT_TOPIC:account.validated.event}
app.kafka.topics.balance-capture-command=${BALANCE_CAPTURE_COMMAND_TOPIC:balance.capture.command}
app.kafka.topics.balance-hold-command=${BALANCE_HOLD_COMMAND_TOPIC:balance.hold.command}
app.kafka.topics.balance-held-event=${BALANCE_HELD_EVENT_TOPIC:balance.held.event}
app.kafka.topics.movement-created=${MOVEMENT_CREATED_TOPIC:movement.created}
app.kafka.consumer.transfer-requested.concurrency=${TRANSFER_REQUESTED_CONSUMER_CONCURRENCY:3}
app.kafka.consumer.account-validated.concurrency=${ACCOUNT_VALIDATED_CONSUMER_CONCURRENCY:3}
app.kafka.consumer.balance-held.concurrency=${BALANCE_HELD_CONSUMER_CONCURRENCY:3}

app.baas.base-url=${BAAS_BASE_URL:http://localhost:8089}
app.baas.timeout=${BAAS_TIMEOUT:5s}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.export.otlp.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:14318/v1/traces}
management.observations.key-values.application=${spring.application.name}

resilience4j.retry.instances.transferRequestedConsumer.max-attempts=3
resilience4j.retry.instances.transferRequestedConsumer.wait-duration=200ms
resilience4j.retry.instances.transferRequestedConsumer.enable-exponential-backoff=true
resilience4j.retry.instances.transferRequestedConsumer.exponential-backoff-multiplier=2
resilience4j.circuitbreaker.instances.transferRequestedConsumer.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.transferRequestedConsumer.sliding-window-size=100
resilience4j.circuitbreaker.instances.transferRequestedConsumer.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.transferRequestedConsumer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.transferRequestedConsumer.wait-duration-in-open-state=15s

resilience4j.retry.instances.commandPublish.max-attempts=3
resilience4j.retry.instances.commandPublish.wait-duration=200ms
resilience4j.retry.instances.commandPublish.enable-exponential-backoff=true
resilience4j.retry.instances.commandPublish.exponential-backoff-multiplier=2
resilience4j.circuitbreaker.instances.commandPublish.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.commandPublish.sliding-window-size=100
resilience4j.circuitbreaker.instances.commandPublish.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.commandPublish.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.commandPublish.wait-duration-in-open-state=15s

resilience4j.retry.instances.baasPixPayment.max-attempts=3
resilience4j.retry.instances.baasPixPayment.wait-duration=200ms
resilience4j.retry.instances.baasPixPayment.enable-exponential-backoff=true
resilience4j.retry.instances.baasPixPayment.exponential-backoff-multiplier=2
resilience4j.circuitbreaker.instances.baasPixPayment.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.baasPixPayment.sliding-window-size=100
resilience4j.circuitbreaker.instances.baasPixPayment.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.baasPixPayment.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.baasPixPayment.wait-duration-in-open-state=15s
resilience4j.bulkhead.instances.baasPixPayment.max-concurrent-calls=20
