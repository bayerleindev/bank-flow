spring.application.name=bank-flow-transfers-api
server.port=${SERVER_PORT:8083}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_flow_transfers?currentSchema=transfers}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backend}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:backend}

spring.flyway.enabled=true
spring.flyway.schemas=transfers
spring.flyway.default-schema=transfers
spring.flyway.create-schemas=true

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.baas.base-url=${BAAS_BASE_URL:http://localhost:8089}
app.baas.timeout=${BAAS_TIMEOUT:3s}
app.kafka.topics.transfer-requested=${TRANSFER_REQUESTED_TOPIC:transfer.requested}
app.kafka.topics.balance-capture-command=${BALANCE_CAPTURE_COMMAND_TOPIC:balance.capture.command}
app.kafka.topics.balance-release-command=${BALANCE_RELEASE_COMMAND_TOPIC:balance.release.command}
app.kafka.topics.movement-created=${MOVEMENT_CREATED_TOPIC:movement.created}
app.ledger.external-settlement-account-id=${LEDGER_EXTERNAL_SETTLEMENT_ACCOUNT_ID:00000000-0000-0000-0000-000000000001}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.export.otlp.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:14318/v1/traces}
management.observations.key-values.application=${spring.application.name}

resilience4j.retry.instances.baasDictLookup.max-attempts=3
resilience4j.retry.instances.baasDictLookup.wait-duration=200ms
resilience4j.retry.instances.baasDictLookup.enable-exponential-backoff=true
resilience4j.retry.instances.baasDictLookup.exponential-backoff-multiplier=2
resilience4j.retry.instances.baasDictLookup.retry-exceptions=org.springframework.web.reactive.function.client.WebClientRequestException,org.springframework.web.reactive.function.client.WebClientResponseException$TooManyRequests,org.springframework.web.reactive.function.client.WebClientResponseException$BadGateway,org.springframework.web.reactive.function.client.WebClientResponseException$ServiceUnavailable,org.springframework.web.reactive.function.client.WebClientResponseException$GatewayTimeout
resilience4j.circuitbreaker.instances.baasDictLookup.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.baasDictLookup.sliding-window-size=50
resilience4j.circuitbreaker.instances.baasDictLookup.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.baasDictLookup.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.baasDictLookup.wait-duration-in-open-state=15s
resilience4j.bulkhead.instances.baasDictLookup.max-concurrent-calls=32
resilience4j.bulkhead.instances.baasDictLookup.max-wait-duration=250ms

resilience4j.retry.instances.kafkaPublish.max-attempts=3
resilience4j.retry.instances.kafkaPublish.wait-duration=200ms
resilience4j.retry.instances.kafkaPublish.enable-exponential-backoff=true
resilience4j.retry.instances.kafkaPublish.exponential-backoff-multiplier=2
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-size=100
resilience4j.circuitbreaker.instances.kafkaPublish.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.kafkaPublish.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaPublish.wait-duration-in-open-state=15s
