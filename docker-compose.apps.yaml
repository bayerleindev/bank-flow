services:
  db:
    networks:
      - bankflow-network

  immudb:
    networks:
      - bankflow-network

  bank-flow-outboxer:
    image: bank-flow-outboxer:local
    container_name: bank-flow-outboxer
    restart: always
    depends_on:
      - db
      - kafka-init
    ports:
      - "8088:8088"
    environment:
      SERVER_PORT: "8088"
      POSTGRES_URL: "jdbc:postgresql://db:5432/bank_flow?currentSchema=outboxer,public"
      POSTGRES_USER: "myuser"
      POSTGRES_PASSWORD: "mysecretpassword"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      OUTBOX_PUBLISHER_FIXED_DELAY_MS: "1000"
      OUTBOX_PUBLISHER_BATCH_SIZE: "50"
      OUTBOX_PUBLISHER_LOCK_LEASE_MS: "60000"
      OUTBOX_PUBLISHER_SEND_TIMEOUT_MS: "30000"
      OUTBOX_PUBLISHER_MAX_ATTEMPTS: "10"
      KAFKA_PRODUCER_MAX_BLOCK_MS: "30000"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
      LOG_FILE: ""
    networks:
      - bankflow-network

  bank-flow-accounts:
    image: bank-flow-accounts:local
    container_name: bank-flow-accounts
    restart: always
    depends_on:
      - db
      - bank-flow-outboxer
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: "8084"
      POSTGRES_URL: "jdbc:postgresql://db:5432/bank_flow?currentSchema=accounts,public"
      POSTGRES_USER: "myuser"
      POSTGRES_PASSWORD: "mysecretpassword"
      BAAS_MODE: "mock"
      BAAS_BASE_URL: "http://baas:9098"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
      LOG_FILE: ""
    networks:
      - bankflow-network

  bank-flow-yield:
    image: bank-flow-yield:local
    container_name: bank-flow-yield
    restart: always
    depends_on:
      - db
      - kafka-init
      - bank-flow-outboxer
    ports:
      - "8089:8089"
    environment:
      SERVER_PORT: "8089"
      POSTGRES_URL: "jdbc:postgresql://db:5432/bank_flow?currentSchema=yield,public"
      POSTGRES_USER: "myuser"
      POSTGRES_PASSWORD: "mysecretpassword"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_AUTO_OFFSET_RESET: "earliest"
      CDI_BASE_URL: "https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados"
      YIELD_CDI_PERCENTAGE: "100"
      CDI_LOOKBACK_DAYS: "7"
      KAFKA_PRODUCER_MAX_BLOCK_MS: "30000"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
      LOG_FILE: ""
    networks:
      - bankflow-network

  bank-flow-ledger:
    image: bank-flow-ledger:local
    container_name: bank-flow-ledger
    restart: always
    depends_on:
      - kafka-init
      - immudb
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: "8085"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_CONSUMER_GROUP_ID: "bank-flow-ledger"
      KAFKA_AUTO_OFFSET_RESET: "earliest"
      KAFKA_RETRY_INTERVAL_MS: "1000"
      KAFKA_RETRY_MAX_ATTEMPTS: "3"
      ID_GENERATOR_WORKER_ID: "0"
      IMMUDB_ENABLED: "true"
      IMMUDB_HOST: "immudb"
      IMMUDB_PORT: "3322"
      IMMUDB_DATABASE: "ledger"
      IMMUDB_USERNAME: "immudb"
      IMMUDB_PASSWORD: "immudb"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
      BANK_FLOW_KAFKA_LAG_ENABLED: "false"
      INTEREST_EXPENSE_DIGITAL_ACCOUNT_ID: "00000000-0000-0000-0000-000000000200"
      LOG_FILE: ""
    networks:
      - bankflow-network

  bank-flow-balance-api:
    image: bank-flow-balance-api:local
    container_name: bank-flow-balance-api
    restart: always
    depends_on:
      - db
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: "8082"
      POSTGRES_URL: "jdbc:postgresql://db:5432/bank_flow"
      POSTGRES_USER: "myuser"
      POSTGRES_PASSWORD: "mysecretpassword"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
      LOG_FILE: ""
    networks:
      - bankflow-network

  bank-flow-balance-worker:
    image: bank-flow-balance-worker:local
    container_name: bank-flow-balance-worker
    restart: always
    depends_on:
      - db
      - kafka-init
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: "8087"
      POSTGRES_URL: "jdbc:postgresql://db:5432/bank_flow"
      POSTGRES_USER: "myuser"
      POSTGRES_PASSWORD: "mysecretpassword"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_CONSUMER_GROUP_ID: "bank-flow-balance-worker"
      KAFKA_AUTO_OFFSET_RESET: "earliest"
      KAFKA_RETRY_INTERVAL_MS: "1000"
      KAFKA_RETRY_MAX_ATTEMPTS: "3"
      KAFKA_HEALTH_TIMEOUT_MS: "2000"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
      BANK_FLOW_KAFKA_LAG_ENABLED: "false"
      LOG_FILE: ""
    networks:
      - bankflow-network

  bank-flow-transfer-api:
    image: bank-flow-transfer-api:local
    container_name: bank-flow-transfer-api
    restart: always
    depends_on:
      - db
      - bank-flow-accounts
      - bank-flow-balance-api
      - bank-flow-outboxer
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: "8083"
      POSTGRES_URL: "jdbc:postgresql://db:5432/bank_flow?currentSchema=transfer,public"
      POSTGRES_USER: "myuser"
      POSTGRES_PASSWORD: "mysecretpassword"
      ACCOUNTS_BASE_URL: "http://bank-flow-accounts:8084"
      BALANCE_BASE_URL: "http://bank-flow-balance-api:8082"
      PSP_MODE: "mock"
      PSP_BASE_URL: "http://psp:9099"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
      LOG_FILE: ""
    networks:
      - bankflow-network

  bank-flow-transfer-worker:
    image: bank-flow-transfer-worker:local
    container_name: bank-flow-transfer-worker
    restart: always
    depends_on:
      - db
      - kafka-init
      - bank-flow-balance-api
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: "8086"
      POSTGRES_URL: "jdbc:postgresql://db:5432/bank_flow?currentSchema=transfer,public"
      POSTGRES_USER: "myuser"
      POSTGRES_PASSWORD: "mysecretpassword"
      ACCOUNTS_BASE_URL: "http://bank-flow-accounts:8084"
      BALANCE_BASE_URL: "http://bank-flow-balance-api:8082"
      PSP_MODE: "mock"
      PSP_BASE_URL: "http://psp:9099"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_CONSUMER_GROUP_ID: "bank-flow-transfer-worker"
      KAFKA_AUTO_OFFSET_RESET: "earliest"
      KAFKA_RETRY_INTERVAL_MS: "1000"
      KAFKA_RETRY_MAX_ATTEMPTS: "3"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
      BANK_FLOW_KAFKA_LAG_ENABLED: "false"
      LOG_FILE: ""
    networks:
      - bankflow-network
