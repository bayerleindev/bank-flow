spring.application.name=bank-flow-auth
server.port=${SERVER_PORT:8090}

app.auth.issuer-key=${AUTH_ISSUER_KEY:local-dev-issuer-key}
app.auth.jwt.issuer=${AUTH_JWT_ISSUER:http://localhost:8090}
app.auth.jwt.key-id=${AUTH_JWT_KEY_ID:bank-flow-auth-dev}
app.auth.jwt.private-key=${AUTH_JWT_PRIVATE_KEY:}
app.auth.jwt.ttl=${AUTH_JWT_TTL:15m}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.observations.key-values.application=${spring.application.name}
