spring.application.name=bank-flow-auth-worker
server.port=${SERVER_PORT:8092}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_flow_auth?currentSchema=auth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backend}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:backend}

spring.flyway.enabled=true
spring.flyway.schemas=auth
spring.flyway.default-schema=auth
spring.flyway.create-schemas=true

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:bank-flow-auth-worker}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}

app.kafka.topics.account-created=${ACCOUNT_CREATED_TOPIC:account.created}
app.kafka.consumer.account-created.concurrency=${ACCOUNT_CREATED_CONCURRENCY:3}
app.kafka.consumer.max-poll-records=${KAFKA_CONSUMER_MAX_POLL_RECORDS:50}
app.kafka.consumer.retry.max-attempts=${KAFKA_RETRY_MAX_ATTEMPTS:3}
app.kafka.consumer.retry.initial-interval-ms=${KAFKA_RETRY_INITIAL_INTERVAL_MS:250}
app.kafka.consumer.retry.multiplier=${KAFKA_RETRY_MULTIPLIER:2.0}
app.kafka.consumer.retry.max-interval-ms=${KAFKA_RETRY_MAX_INTERVAL_MS:5000}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.export.otlp.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:14318/v1/traces}
management.observations.key-values.application=${spring.application.name}
