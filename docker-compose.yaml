services:
  db:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: bank_flow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  immudb:
    image: codenotary/immudb:latest
    container_name: immudb
    ports:
      - "3322:3322"    # gRPC port (default)
      - "9497:9497"    # Prometheus metrics
      - "8080:8080"    # Web console / REST API
    volumes:
      - immudb_data:/var/lib/immudb
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092,MINIKUBE://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092,MINIKUBE://host.docker.internal:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,MINIKUBE:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bankflow-network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      ACCOUNT_CREATED_TOPIC: account-created
      ACCOUNT_CREATED_PARTITIONS: 12
      ACCOUNT_CREATED_REPLICATION_FACTOR: 1
      ACCOUNT_CREATED_KEY: owner_id
      ACCOUNT_CREATED_FIELDS: "owner_id:uuid,branch:string,account:string,currency:string"
      ACCOUNT_CREATED_DLT_TOPIC: account-created.DLT
      LEDGER_MOVEMENTS_TOPIC: ledger-movements
      LEDGER_MOVEMENTS_DLT_TOPIC: ledger-movements.DLT
      LEDGER_MOVEMENTS_PARTITIONS: 12
      LEDGER_MOVEMENTS_REPLICATION_FACTOR: 1
      LEDGER_MOVEMENTS_KEY: source_owner_id
      LEDGER_MOVEMENTS_FIELDS: "transfer_id:uuid,source_owner_id:uuid,source_account:string,destination_owner_id:uuid,destination_account:string,amount_cents:int,currency:string"
      LEDGER_REVERSALS_TOPIC: ledger-reversals
      LEDGER_REVERSALS_DLT_TOPIC: ledger-reversals.DLT
      LEDGER_REVERSALS_PARTITIONS: 12
      LEDGER_REVERSALS_REPLICATION_FACTOR: 1
      LEDGER_REVERSALS_KEY: original_external_id
      LEDGER_REVERSALS_FIELDS: "reversal_id:uuid,original_external_id:string,reason:string"
      LEDGER_POSTING_CREATED_TOPIC: ledger-posting-created
      LEDGER_POSTING_CREATED_DLT_TOPIC: ledger-posting-created.DLT
      LEDGER_POSTING_CREATED_PARTITIONS: 12
      LEDGER_POSTING_CREATED_REPLICATION_FACTOR: 1
      LEDGER_POSTING_CREATED_KEY: external_id
    command:
      - /bin/sh
      - -c
      - |
        kafka-topics \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic "$${ACCOUNT_CREATED_TOPIC}" \
          --partitions "$${ACCOUNT_CREATED_PARTITIONS}" \
          --replication-factor "$${ACCOUNT_CREATED_REPLICATION_FACTOR}"
        kafka-topics \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic "$${ACCOUNT_CREATED_DLT_TOPIC}" \
          --partitions "$${ACCOUNT_CREATED_PARTITIONS}" \
          --replication-factor "$${ACCOUNT_CREATED_REPLICATION_FACTOR}"
        kafka-topics \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic "$${LEDGER_MOVEMENTS_TOPIC}" \
          --partitions "$${LEDGER_MOVEMENTS_PARTITIONS}" \
          --replication-factor "$${LEDGER_MOVEMENTS_REPLICATION_FACTOR}"
        kafka-topics \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic "$${LEDGER_MOVEMENTS_DLT_TOPIC}" \
          --partitions "$${LEDGER_MOVEMENTS_PARTITIONS}" \
          --replication-factor "$${LEDGER_MOVEMENTS_REPLICATION_FACTOR}"
        kafka-topics \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic "$${LEDGER_REVERSALS_TOPIC}" \
          --partitions "$${LEDGER_REVERSALS_PARTITIONS}" \
          --replication-factor "$${LEDGER_REVERSALS_REPLICATION_FACTOR}"
        kafka-topics \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic "$${LEDGER_REVERSALS_DLT_TOPIC}" \
          --partitions "$${LEDGER_REVERSALS_PARTITIONS}" \
          --replication-factor "$${LEDGER_REVERSALS_REPLICATION_FACTOR}"
        kafka-topics \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic "$${LEDGER_POSTING_CREATED_TOPIC}" \
          --partitions "$${LEDGER_POSTING_CREATED_PARTITIONS}" \
          --replication-factor "$${LEDGER_POSTING_CREATED_REPLICATION_FACTOR}"
        kafka-topics \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic "$${LEDGER_POSTING_CREATED_DLT_TOPIC}" \
          --partitions "$${LEDGER_POSTING_CREATED_PARTITIONS}" \
          --replication-factor "$${LEDGER_POSTING_CREATED_REPLICATION_FACTOR}"
    restart: "no"
    networks:
      - bankflow-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bankflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - bankflow-network

volumes:
  postgres_data:
  immudb_data:
  kafka_data:

networks:
  bankflow-network:
    driver: bridge
    name: bankflow-network
