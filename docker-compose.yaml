services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: backend
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8082:8080"

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      - kafka
    command:
      - /bin/bash
      - -c
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list; do
          sleep 2
        done
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic ledger.journal.created \
          --partitions 3 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic balance.capture.command \
          --partitions 3 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic balance.hold.command \
          --partitions 3 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic balance.held.event \
          --partitions 3 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic balance.release.command \
          --partitions 3 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic movement.created \
          --partitions 3 \
          --replication-factor 1

  immudb:
    image: codenotary/immudb:latest
    environment:
      IMMUDB_ADDRESS: 0.0.0.0
      IMMUDB_PORT: 3322
    ports:
      - "3322:3322"
      - "8093:8080"
    volumes:
      - immudb-data:/var/lib/immudb

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  bank-flow-auth:
    image: eclipse-temurin:21-jdk
    working_dir: /app
    command: ["./gradlew", "bootRun"]
    environment:
      SERVER_PORT: 8090
      AUTH_ISSUER_KEY: ${AUTH_ISSUER_KEY:-local-dev-issuer-key}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-http://localhost:8090}
      AUTH_JWT_KEY_ID: ${AUTH_JWT_KEY_ID:-bank-flow-auth-dev}
      AUTH_JWT_PRIVATE_KEY: ${AUTH_JWT_PRIVATE_KEY:-}
      AUTH_JWT_TTL: ${AUTH_JWT_TTL:-15m}
    ports:
      - "8090:8090"
    volumes:
      - ./bank-flow-auth:/app
      - gradle-cache:/root/.gradle

volumes:
  postgres-data:
  kafka-data:
  immudb-data:
  redis-data:
  gradle-cache:
