spring.datasource.url=jdbc:tc:postgresql:15-alpine:///bank_flow
spring.datasource.username=myuser
spring.datasource.password=mysecretpassword
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.kafka.listener.auto-startup=false
spring.kafka.admin.auto-create=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=bank-flow-balance-test
bank-flow.kafka.topics.ledger-posting-created=ledger-posting-created
bank-flow.kafka.retry.interval-ms=10
bank-flow.kafka.retry.max-attempts=2
bank-flow.health.kafka.timeout-ms=200
management.health.kafka.enabled=false
management.otlp.metrics.export.enabled=false
