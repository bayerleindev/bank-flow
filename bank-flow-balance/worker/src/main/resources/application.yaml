management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,db,kafka
        liveness:
          include: livenessState,ping
      probes:
        enabled: 'true'
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
  opentelemetry:
    resource-attributes:
      service:
        name: ${spring.application.name}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
      sampler: always-on
  health:
    kafka:
      enabled: 'true'
  metrics:
    tags:
      application: ${spring.application.name}
    enable:
      hikaricp: 'true'
  otlp:
    metrics:
      export:
        enabled: 'false'
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    enabled: true
    baggage:
      remote-fields:
        - transfer_id
      correlation:
        fields:
          - transfer_id
spring:
  flyway:
    enabled: 'true'
    baseline-on-migrate: 'true'
    locations: classpath:db/migration
  kafka:
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:bank-flow-balance-worker}
      enable-auto-commit: 'false'
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:2}
      observation-enabled: 'true'
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      idle-timeout: ${HIKARI_IDLE_TIMEOUT_MS:600000}
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:4}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:2000}
      max-lifetime: ${HIKARI_MAX_LIFETIME_MS:1500000}
      minimum-idle: ${HIKARI_MINIMUM_IDLE:1}
    password: ${POSTGRES_PASSWORD:mysecretpassword}
    username: ${POSTGRES_USER:myuser}
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/bank_flow}
  application:
    name: bank-flow-balance-worker
bank-flow:
  kafka:
    retry:
      max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}
      interval-ms: ${KAFKA_RETRY_INTERVAL_MS:1000}
    topics:
      ledger-posting-created: ledger-posting-created
  health:
    kafka:
      timeout-ms: ${KAFKA_HEALTH_TIMEOUT_MS:2000}
server:
  port: ${SERVER_PORT:8087}
logging:
  pattern:
    level: "%5p [${spring.application.name:},trace_id=%X{traceId:-},span_id=%X{spanId:-},transfer_id=%X{transfer_id:-}]"
