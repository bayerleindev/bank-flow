spring.application.name=bank-flow-balance-worker
server.port=${SERVER_PORT:8088}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_flow_balance?currentSchema=balance}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backend}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:backend}

spring.flyway.enabled=true
spring.flyway.schemas=balance
spring.flyway.default-schema=balance
spring.flyway.create-schemas=true

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:bank-flow-balance-worker}
spring.kafka.consumer.auto-offset-reset=${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=br.com.bankflow.balance.shared.kafka,br.com.bankflow.balance.shared.domain
spring.kafka.consumer.properties.spring.json.value.default.type=br.com.bankflow.balance.shared.kafka.LedgerJournalCreatedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.ack-mode=record

app.kafka.topics.ledger-journal-created=${LEDGER_JOURNAL_CREATED_TOPIC:ledger.journal.created}
app.kafka.topics.balance-capture-command=${BALANCE_CAPTURE_COMMAND_TOPIC:balance.capture.command}
app.kafka.topics.balance-hold-command=${BALANCE_HOLD_COMMAND_TOPIC:balance.hold.command}
app.kafka.topics.balance-held-event=${BALANCE_HELD_EVENT_TOPIC:balance.held.event}
app.kafka.topics.balance-release-command=${BALANCE_RELEASE_COMMAND_TOPIC:balance.release.command}
app.kafka.consumer.ledger-journal-created.concurrency=${LEDGER_JOURNAL_CREATED_CONSUMER_CONCURRENCY:3}
app.kafka.consumer.balance-capture-command.concurrency=${BALANCE_CAPTURE_COMMAND_CONSUMER_CONCURRENCY:3}
app.kafka.consumer.balance-hold-command.concurrency=${BALANCE_HOLD_COMMAND_CONSUMER_CONCURRENCY:3}
app.kafka.consumer.balance-release-command.concurrency=${BALANCE_RELEASE_COMMAND_CONSUMER_CONCURRENCY:3}
app.kafka.consumer.max-poll-records=${KAFKA_MAX_POLL_RECORDS:100}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.export.otlp.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:14318/v1/traces}
management.observations.key-values.application=${spring.application.name}
