spring.application.name=bank-flow-balance-api
server.port=${SERVER_PORT:8087}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_flow_balance?currentSchema=balance}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backend}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:backend}

spring.flyway.enabled=true
spring.flyway.schemas=balance
spring.flyway.default-schema=balance
spring.flyway.create-schemas=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH_JWT_ISSUER_URI:http://localhost:8090}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_JWKS_URI:http://localhost:8090/.well-known/jwks.json}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.export.otlp.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:14318/v1/traces}
management.observations.key-values.application=${spring.application.name}
