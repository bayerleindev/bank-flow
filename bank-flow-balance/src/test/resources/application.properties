spring.datasource.url=jdbc:h2:mem:bank_flow_balance;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.kafka.listener.auto-startup=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=bank-flow-balance-test
bank-flow.kafka.topics.ledger-posting-created=ledger-posting-created
bank-flow.kafka.retry.interval-ms=10
bank-flow.kafka.retry.max-attempts=2
bank-flow.health.kafka.timeout-ms=200
management.health.kafka.enabled=false
