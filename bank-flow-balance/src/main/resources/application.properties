spring.application.name=bank-flow-balance

server.port=${SERVER_PORT:8082}

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/bank_flow}
spring.datasource.username=${POSTGRES_USER:myuser}
spring.datasource.password=${POSTGRES_PASSWORD:mysecretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

bank-flow.kafka.topics.ledger-posting-created=ledger-posting-created
bank-flow.kafka.retry.interval-ms=${KAFKA_RETRY_INTERVAL_MS:1000}
bank-flow.kafka.retry.max-attempts=${KAFKA_RETRY_MAX_ATTEMPTS:3}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:bank-flow-balance}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.observation-enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db,kafka
management.health.kafka.enabled=true
bank-flow.health.kafka.timeout-ms=${KAFKA_HEALTH_TIMEOUT_MS:2000}
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.opentelemetry.tracing.sampler=always-on
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
management.otlp.metrics.export.enabled=false
logging.structured.format.console=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.structured.format.file=${LOGGING_STRUCTURED_FORMAT:logstash}
logging.file.name=${LOG_FILE:../logs/${spring.application.name}.log}
