nameOverride: bank-flow-balance

metrics:
  job: bank-flow-services

serviceMonitor:
  enabled: true
  namespace: ""
  interval: 15s
  scrapeTimeout: 10s
  path: /actuator/prometheus
  labels:
    release: monitoring

probe:
  enabled: true
  namespace: ""
  jobName: bank-flow-health
  module: http_2xx
  proberUrl: prometheus-blackbox-exporter.monitoring.svc:9115
  targetPath: /actuator/health
  interval: 15s
  scrapeTimeout: 10s
  labels:
    release: monitoring

commonEnv:
  POSTGRES_URL: "jdbc:postgresql://host.docker.internal:5432/bank_flow"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
  MANAGEMENT_HEALTH_SHOW_DETAILS: "never"
  BPL_JVM_THREAD_COUNT: "50"
  LOG_FILE: ""

secretEnv:
  POSTGRES_USER: "myuser"
  POSTGRES_PASSWORD: "mysecretpassword"

components:
  api:
    enabled: true
    name: bank-flow-balance-api
    replicaCount: 1
    image:
      repository: gbcamargo/bank-flow-balance-api
      tag: 1.0.0
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8082
    env:
      SERVER_PORT: "8082"
    readinessProbe:
      path: /actuator/health/readiness
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    livenessProbe:
      path: /actuator/health/liveness
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  worker:
    enabled: true
    name: bank-flow-balance-worker
    replicaCount: 1
    image:
      repository: gbcamargo/bank-flow-balance-worker
      tag: 1.0.0
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8087
    env:
      SERVER_PORT: "8087"
      KAFKA_BOOTSTRAP_SERVERS: "host.docker.internal:9094"
      KAFKA_CONSUMER_GROUP_ID: "bank-flow-balance-worker"
      KAFKA_AUTO_OFFSET_RESET: "earliest"
      KAFKA_RETRY_INTERVAL_MS: "1000"
      KAFKA_RETRY_MAX_ATTEMPTS: "3"
      KAFKA_HEALTH_TIMEOUT_MS: "2000"
      BANK_FLOW_KAFKA_LAG_ENABLED: "false"
    readinessProbe:
      path: /actuator/health/readiness
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    livenessProbe:
      path: /actuator/health/liveness
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
