{{- range $componentKey, $component := .Values.components }}
{{- if $component.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $component.name }}-config
  labels:
    app.kubernetes.io/name: {{ $component.name }}
    app.kubernetes.io/component: {{ $componentKey }}
    app.kubernetes.io/part-of: bank-flow
data:
{{- range $key, $value := $.Values.commonEnv }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- range $key, $value := $component.env }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
---
{{- end }}
{{- end }}
